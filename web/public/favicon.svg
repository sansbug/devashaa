<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Same mark as Logo.jsx: the North Indian kuṇḍalī, with bhāva 1 (the lagna)
       filled. Colours are literal here — a favicon gets no CSS variables.
       Padding is tighter than the in-app mark so it reads at 16px. -->
  <rect width="64" height="64" rx="12" fill="#12100e"/>
  <g fill="none" stroke="#8c7f70" stroke-width="3" stroke-linejoin="round">
    <rect x="10" y="10" width="44" height="44" rx="2"/>
    <path d="M10 10 L54 54 M54 10 L10 54"/>
    <path d="M32 10 L54 32 L32 54 L10 32 Z"/>
  </g>
  <path d="M32 10 L43 21 L32 32 L21 21 Z" fill="#c9a227"/>
</svg>
